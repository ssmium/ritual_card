<script>
// ─── 팔레트 정의 ───
const PALETTES = [
  { name: 'peach',    bg: '#F7C5A8', text: '#3D2B1F', accent: '#E8896A', sub: '#7A5C4F' },
  { name: 'blush',    bg: '#F2D4C8', text: '#3D2B1F', accent: '#C96A50', sub: '#7A5C4F' },
  { name: 'butter',   bg: '#F5E6C8', text: '#3D2B1F', accent: '#C8903A', sub: '#7A5C4F' },
  { name: 'sage',     bg: '#C8D8C0', text: '#2B3D28', accent: '#5A8050', sub: '#4A6040' },
  { name: 'lavender', bg: '#D8CEEA', text: '#2B2040', accent: '#7A60B0', sub: '#5A4080' },
  { name: 'cream',    bg: '#FDF6F0', text: '#3D2B1F', accent: '#E8896A', sub: '#B89B8E' },
];

const CHIP_COLORS = ['#F7C5A8','#F2D4C8','#F5E6C8','#C8D8C0','#D8CEEA','#FDF6F0'];

let cardData = []; // { text, subtitle, palette }

function toggleKey(inputId, btnId) {
  const inp = document.getElementById(inputId);
  const btn = document.getElementById(btnId);
  if (inp.type === 'password') { inp.type = 'text'; btn.textContent = '🙈'; }
  else { inp.type = 'password'; btn.textContent = '👁'; }
}

function showError(msg) {
  const box = document.getElementById('errorBox');
  document.getElementById('errorMsg').textContent = msg;
  box.style.display = 'block';
}
function hideError() { document.getElementById('errorBox').style.display = 'none'; }

async function callGemini(prompt, apiKey) {
  const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${apiKey}`, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      contents: [{ parts: [{ text: prompt }] }],
      generationConfig: { temperature: 0.9, maxOutputTokens: 1000 }
    })
  });
  const data = await res.json();
  if (!res.ok) {
    const msg = data?.error?.message || '';
    const isQuota = msg.toLowerCase().includes('quota') || msg.toLowerCase().includes('rate') || res.status === 429;
    throw { isQuota, message: msg || `Gemini 오류 (${res.status})` };
  }
  let raw = data?.candidates?.[0]?.content?.parts?.[0]?.text || '';
  return raw.replace(/```json|```/g, '').trim();
}

async function callClaude(prompt, apiKey) {
  const res = await fetch('https://api.anthropic.com/v1/messages', {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
      'x-api-key': apiKey,
      'anthropic-version': '2023-06-01',
      'anthropic-dangerous-direct-browser-access': 'true'
    },
    body: JSON.stringify({
      model: 'claude-sonnet-4-6',
      max_tokens: 1000,
      messages: [{ role: 'user', content: prompt }]
    })
  });
  const data = await res.json();
  if (!res.ok) throw new Error(data?.error?.message || `Claude 오류 (${res.status})`);
  let raw = data?.content?.[0]?.text || '';
  return raw.replace(/```json|```/g, '').trim();
}

async function generateCards() {
  const geminiKey = document.getElementById('geminiKey').value.trim();
  const claudeKey = document.getElementById('claudeKey').value.trim();
  const topic = document.getElementById('topicInput').value.trim();
  const count = parseInt(document.getElementById('cardCount').value);
  const tone = document.getElementById('toneSelect').value;

  if (!geminiKey && !claudeKey) { showError('API 키를 하나 이상 입력해주세요.'); return; }
  if (!topic) { showError('주제를 입력해주세요.'); return; }
  hideError();

  document.getElementById('genBtn').disabled = true;
  document.getElementById('loading').style.display = 'block';
  document.getElementById('cardsSection').style.display = 'none';

  const loadingMsgs = ['문구를 만들고 있어요...','감성을 다듬는 중...','거의 다 됐어요 ✦'];
  let li = 0;
  const lInterval = setInterval(() => {
    li = (li + 1) % loadingMsgs.length;
    document.getElementById('loadingMsg').textContent = loadingMsgs[li];
  }, 1800);

  const prompt = `당신은 감성적인 인스타그램 리추얼 카드 문구 작가입니다.

주제: "${topic}"
톤: ${tone}
카드 수: ${count}장 (첫 번째는 표지 카드, 나머지는 내용 카드)

카드 구조:
- 카드 1 (표지): title(제목, 20자 이내) + subtitle(부제, 20자 이내)
- 카드 2~끝 (내용): num(번호, 예: "1"), heading(소제목, 15자 이내) + line1(본문 첫줄, 25자 이내) + line2(본문 둘째줄, 25자 이내) + line3(설명 첫줄, 25자 이내) + line4(설명 둘째줄, 25자 이내)

반드시 JSON 배열만 반환하세요. 다른 텍스트 없이 순수 JSON만:
[
  {"type":"cover","title":"제목","subtitle":"부제"},
  {"type":"content","num":"1","heading":"소제목","line1":"본문 첫줄","line2":"본문 둘째줄","line3":"설명 첫줄","line4":"설명 둘째줄"}
]`;

  try {
    let raw = null;

    if (geminiKey) {
      try {
        raw = await callGemini(prompt, geminiKey);
      } catch (e) {
        if (e.isQuota && claudeKey) {
          document.getElementById('loadingMsg').textContent = 'Gemini 한도 초과 → Claude로 전환 중...';
          raw = await callClaude(prompt, claudeKey);
        } else if (e.isQuota && !claudeKey) {
          throw new Error('Gemini 한도 초과. Claude API 키도 입력해주세요.');
        } else {
          throw new Error(e.message);
        }
      }
    } else {
      raw = await callClaude(prompt, claudeKey);
    }

    const parsed = JSON.parse(raw);
    cardData = parsed.map((item, i) => ({
      ...item,
      paletteIdx: i % PALETTES.length
    }));
    renderCards(topic);
  } catch (e) {
    showError('오류: ' + (e.message || e));
  } finally {
    clearInterval(lInterval);
    document.getElementById('loading').style.display = 'none';
    document.getElementById('genBtn').disabled = false;
  }
}

function renderCards(topic) {
  const grid = document.getElementById('cardsGrid');
  grid.innerHTML = '';
  document.getElementById('resultTitle').textContent = `"${topic}" 리추얼 카드`;
  document.getElementById('cardsSection').style.display = 'block';

  cardData.forEach((card, idx) => {
    const item = document.createElement('div');
    item.className = 'card-item';

    const canvasWrap = document.createElement('div');
    canvasWrap.className = 'card-canvas-wrap';

    const canvas = document.createElement('canvas');
    canvas.className = 'card-canvas';
    canvas.width = 1080;
    canvas.height = 1080;
    canvas.dataset.idx = idx;

    canvasWrap.appendChild(canvas);

    const controls = document.createElement('div');
    controls.className = 'card-controls';

    const num = document.createElement('div');
    num.className = 'card-num';
    num.textContent = `CARD ${String(idx + 1).padStart(2, '0')}`;

    const chips = document.createElement('div');
    chips.className = 'color-chips';
    CHIP_COLORS.forEach((color, ci) => {
      const chip = document.createElement('div');
      chip.className = 'color-chip' + (ci === card.paletteIdx ? ' active' : '');
      chip.style.background = color;
      chip.title = PALETTES[ci].name;
      chip.onclick = () => {
        cardData[idx].paletteIdx = ci;
        chips.querySelectorAll('.color-chip').forEach((c, i) => c.classList.toggle('active', i === ci));
        drawCard(canvas, cardData[idx], idx + 1, cardData.length);
      };
      chips.appendChild(chip);
    });
function createEditBox(card, idx, canvas) {
  const box = document.createElement('div');
  box.className = 'edit-box';

  const fields = card.type === 'cover'
    ? [
        ['title', '제목'],
        ['subtitle', '부제']
      ]
    : [
        ['heading', '소제목'],
        ['line1', '본문 1'],
        ['line2', '본문 2'],
        ['line3', '설명 1'],
        ['line4', '설명 2']
      ];

  fields.forEach(([key, label]) => {
    const wrap = document.createElement('div');
    wrap.className = 'edit-field';

    const lab = document.createElement('label');
    lab.textContent = label;

    const input = document.createElement('textarea');
    input.rows = 1;
    input.value = card[key] || '';

    input.addEventListener('input', () => {
      cardData[idx][key] = input.value;
      drawCard(canvas, cardData[idx], idx + 1, cardData.length);
    });

    wrap.appendChild(lab);
    wrap.appendChild(input);
    box.appendChild(wrap);
  });

  return box;
}
    const dlBtn = document.createElement('button');
    dlBtn.className = 'btn-dl';
    dlBtn.textContent = '저장';
    dlBtn.onclick = () => downloadCard(canvas, idx + 1);

    controls.appendChild(num);
    controls.appendChild(chips);
    controls.appendChild(dlBtn);
const editBox = createEditBox(card, idx, canvas);

item.appendChild(canvasWrap);
item.appendChild(editBox);
item.appendChild(controls);
grid.appendChild(item);

drawCard(canvas, card, idx + 1, cardData.length);

  });
}

function drawCard(canvas, card, num, total) {
  const ctx = canvas.getContext('2d');
  const W = 1080, H = 1080;
  const pal = PALETTES[card.paletteIdx];
  const M = 80; // margin

  ctx.clearRect(0, 0, W, H);

  // 배경
  ctx.fillStyle = pal.bg;
  ctx.fillRect(0, 0, W, H);

  // 그라디언트 오버레이
  const grad = ctx.createRadialGradient(W*0.3, H*0.25, 0, W*0.5, H*0.5, W*0.8);
  grad.addColorStop(0, 'rgba(255,255,255,0.15)');
  grad.addColorStop(1, 'rgba(0,0,0,0.04)');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, W, H);

  // 상단 장식선
  ctx.strokeStyle = pal.accent;
  ctx.lineWidth = 2;
  ctx.globalAlpha = 0.35;
  ctx.beginPath(); ctx.moveTo(M, M); ctx.lineTo(W-M, M); ctx.stroke();
  ctx.globalAlpha = 1;
  drawDiamond(ctx, W/2, M, 7, pal.accent, 0.6);

  // 하단 장식선
  ctx.strokeStyle = pal.accent;
  ctx.lineWidth = 2;
  ctx.globalAlpha = 0.35;
  ctx.beginPath(); ctx.moveTo(M, H-M); ctx.lineTo(W-M, H-M); ctx.stroke();
  ctx.globalAlpha = 1;

  // 카드 번호 (우상단)
  ctx.font = '400 24px "NanumSquareNeo", sans-serif';
  ctx.fillStyle = pal.sub;
  ctx.globalAlpha = 0.45;
  ctx.textAlign = 'right';
  ctx.fillText(`${num} / ${total}`, W-M, M-16);
  ctx.globalAlpha = 1;

  if (card.type === 'cover') {
    // ── 표지 카드 ──
    // 큰 제목
    ctx.font = '800 88px "NanumSquareNeo", sans-serif';
    ctx.fillStyle = pal.text;
    ctx.textAlign = 'center';
    wrapText(ctx, card.title, W/2, H/2 - 60, W - M*2.5, 100);

    // 구분선
    ctx.strokeStyle = pal.accent;
    ctx.lineWidth = 2;
    ctx.globalAlpha = 0.5;
    ctx.beginPath(); ctx.moveTo(W/2-80, H/2+80); ctx.lineTo(W/2+80, H/2+80); ctx.stroke();
    ctx.globalAlpha = 1;

    // 부제
    ctx.font = '400 42px "NanumSquareNeo", sans-serif';
    ctx.fillStyle = pal.sub;
    ctx.globalAlpha = 0.8;
    ctx.textAlign = 'center';
    wrapText(ctx, card.subtitle, W/2, H/2 + 150, W - M*3, 54);
    ctx.globalAlpha = 1;

  } else {
    // ── 내용 카드 ──
    const LX = M + 20; // 좌측 텍스트 시작 x
    const TW = W - M*2 - 40; // 텍스트 폭

    // 번호 + 소제목 영역 (상단 1/3)
    const headY = 200;

    // 번호 (작게)
    ctx.font = '800 32px "NanumSquareNeo", sans-serif';
    ctx.fillStyle = pal.accent;
    ctx.textAlign = 'left';
    ctx.fillText(card.num + '.', LX, headY);

    // 소제목 (굵게 크게)
    ctx.font = '800 66px "NanumSquareNeo", sans-serif';
    ctx.fillStyle = pal.text;
    ctx.textAlign = 'left';
    wrapTextLeft(ctx, card.heading, LX, headY + 72, TW, 78);

    // 구분선
    ctx.strokeStyle = pal.accent;
    ctx.lineWidth = 2;
    ctx.globalAlpha = 0.4;
    ctx.beginPath(); ctx.moveTo(LX, 420); ctx.lineTo(LX + 120, 420); ctx.stroke();
    ctx.globalAlpha = 1;

    // 본문 2줄 (중간, 보통 굵기)
    ctx.font = '500 40px "NanumSquareNeo", sans-serif';
    ctx.fillStyle = pal.text;
    ctx.globalAlpha = 0.9;
    ctx.textAlign = 'left';
    ctx.fillText(card.line1 || '', LX, 500);
    ctx.fillText(card.line2 || '', LX, 556);
    ctx.globalAlpha = 1;

    // 설명 2줄 (하단, 연한 색)
    ctx.font = '400 36px "NanumSquareNeo", sans-serif';
    ctx.fillStyle = pal.sub;
    ctx.globalAlpha = 0.75;
    ctx.textAlign = 'left';
    ctx.fillText(card.line3 || '', LX, 660);
    ctx.fillText(card.line4 || '', LX, 710);
    ctx.globalAlpha = 1;
  }

  // 하단 브랜드
  ctx.font = '300 22px "NanumSquareNeo", sans-serif';
  ctx.fillStyle = pal.sub;
  ctx.globalAlpha = 0.4;
  ctx.textAlign = 'center';
  ctx.fillText('✦ 나를 갖는 시간 ✦', W/2, H-M+20);
  ctx.globalAlpha = 1;
}

function wrapTextLeft(ctx, text, x, y, maxWidth, lineHeight) {
  if (!text) return;
  let line = '';
  let currentY = y;
  for (let i = 0; i < text.length; i++) {
    const testLine = line + text[i];
    if (ctx.measureText(testLine).width > maxWidth && line) {
      ctx.fillText(line, x, currentY);
      line = text[i];
      currentY += lineHeight;
    } else {
      line = testLine;
    }
  }
  if (line) ctx.fillText(line, x, currentY);
}

function drawDiamond(ctx, x, y, size, color, alpha) {
  ctx.save();
  ctx.globalAlpha = alpha;
  ctx.fillStyle = color;
  ctx.beginPath();
  ctx.moveTo(x, y - size);
  ctx.lineTo(x + size, y);
  ctx.lineTo(x, y + size);
  ctx.lineTo(x - size, y);
  ctx.closePath();
  ctx.fill();
  ctx.restore();
}

function wrapText(ctx, text, x, y, maxWidth, lineHeight) {
  if (!text) return;
  const words = text.split('');
  let line = '';
  let lines = [];

  // 한국어는 글자 단위로, 공백 있으면 단어 단위로
  if (text.includes(' ')) {
    const wordArr = text.split(' ');
    for (let i = 0; i < wordArr.length; i++) {
      const testLine = line + (line ? ' ' : '') + wordArr[i];
      if (ctx.measureText(testLine).width > maxWidth && line) {
        lines.push(line);
        line = wordArr[i];
      } else {
        line = testLine;
      }
    }
    if (line) lines.push(line);
  } else {
    // 한국어 글자 단위
    for (let i = 0; i < words.length; i++) {
      const testLine = line + words[i];
      if (ctx.measureText(testLine).width > maxWidth && line) {
        lines.push(line);
        line = words[i];
      } else {
        line = testLine;
      }
    }
    if (line) lines.push(line);
  }

  const totalH = lines.length * lineHeight;
  const startY = y - totalH / 2 + lineHeight / 2;
  lines.forEach((l, i) => {
    ctx.fillText(l, x, startY + i * lineHeight);
  });
}

function downloadCard(canvas, num) {
  const link = document.createElement('a');
  link.download = `ritual_card_${String(num).padStart(2, '0')}.png`;
  link.href = canvas.toDataURL('image/png');
  link.click();
}

function downloadAll() {
  const canvases = document.querySelectorAll('.card-canvas');
  canvases.forEach((canvas, i) => {
    setTimeout(() => downloadCard(canvas, i + 1), i * 300);
  });
}
